<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Resume Matcher Workspace{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ url_for('match.home') }}">
      <!-- Changed from Evidence Desk to Resume Matcher -->
      <span class="brand-mark">⚡</span> RESUME MATCHER
    </a>
    <div style="display: flex; gap: 1rem; align-items: center; font-size: 0.85rem; color: var(--text-muted);">
      <span>1. JD</span>
      <span>→</span>
      <span>2. Resumes</span>
      <span>→</span>
      <span style="color: var(--primary); font-weight: 600;">3. Match Engine</span>
    </div>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>
  
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      setTimeout(() => {
        document.querySelectorAll('.progress-fill').forEach(bar => {
          bar.style.width = bar.getAttribute('data-width') + '%';
        });
      }, 200);

      document.querySelectorAll('input[type="file"]').forEach(input => {
        input.addEventListener('change', function(e) {
          const textDisplay = this.parentElement.querySelector('div:last-child');
          if(this.files.length > 1) {
            textDisplay.innerHTML = `<span style="color: var(--accent); font-weight: 600;">${this.files.length} files staged</span>`;
          } else if (this.files.length === 1) {
            textDisplay.innerHTML = `<span style="color: var(--accent); font-weight: 600;">${this.files[0].name} staged</span>`;
          }
        });
      });
    });
  </script>
</body>
</html>
