{% extends "base.html" %}
{% block title %}Step 1: Target Profile{% endblock %}
{% block content %}

<div style="max-width: 700px; margin: 0 auto;">
  <div style="text-align: center; margin-bottom: 3rem;">
    <div class="subtle" style="text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; color: var(--accent);">Step 1 of 3</div>
    <h1>Define Target Profile</h1>
    <p class="subtle">Upload or paste the Job Description to calibrate the AI model.</p>
  </div>

  <div class="card">
    <form method="post" enctype="multipart/form-data">
      <div class="field">
        <label>Provide JD Document</label>
        <div class="file-drop">
          <input type="file" id="jd_file" name="jd_file" accept=".pdf,.docx">
          <div style="font-size: 2rem; margin-bottom: 1rem;">📄</div>
          <div>Drag & drop JD file here</div>
        </div>
      </div>

      <div style="text-align: center; margin: 2rem 0; color: var(--border-light);">— OR —</div>

      <div class="field">
        <label>Raw Requirements</label>
        <textarea id="raw_text" name="raw_text" rows="5" placeholder="Paste the exact skills and requirements here..."></textarea>
      </div>

      <button class="btn" type="submit" style="width: 100%;">Initialize Model & Continue →</button>
    </form>
  </div>
</div>
{% endblock %}
